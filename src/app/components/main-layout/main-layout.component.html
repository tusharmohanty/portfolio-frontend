<div class="page" [class.scrolled]="scrolled()">
  <!-- Header -->
  <div class="header">
    <div *ngIf="syncMsg()" class="syncBanner" [class.err]="syncErr()">
      {{ syncMsg() }}
    </div>

    <div class="brand">
      <div class="brandTitle">Portfolio</div>
      <div class="brandSub">Kite</div>
    </div>

    <div class="headerActions">
      <div class="menuWrap">
        <button class="btn menuBtn" (click)="toggleMenu($event)">
          ☰ Menu
        </button>

        <div class="menu" *ngIf="menuOpen()">
          <button class="menuItem" (click)="openAddStocks($event)">
            Add Stocks
          </button>

          <button class="menuItem"
                  [disabled]="syncing()"
                  (click)="syncHistoricalPrices($event)">
            {{ syncing() ? 'Running EOD…' : 'Sync Prices' }}
          </button>
        </div>
      </div>

      <button class="btn loginBtn"
              [class.logged]="loggedIn()"
              (click)="startKiteLogin()">
        {{ loggedIn() ? 'LoggedIn' : 'Login' }}
      </button>
    </div>
  </div>

  <div class="backdrop" *ngIf="menuOpen()" (click)="closeMenu()"></div>

  <div class="tabs">
    <a class="tab"
       routerLink="/returns"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }">
      Stocks
    </a>

    <a class="tab"
       routerLink="/swing"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }">
      Swing
    </a>

    <a class="tab"
       routerLink="/watchlist"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }">
      Watchlist
    </a>
    <a class="tab"
       routerLink="/closed-swing"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }">
      Closed Swing
    </a>

    <a class="tab"
       routerLink="/trades"
       routerLinkActive="active">
      Trades
    </a>

    <a class="tab"
       routerLink="/holdings"
       routerLinkActive="active">
      Holdings
    </a>

    <a class="tab"
       routerLink="/core"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }">
      Core
    </a>
  </div>

  <div class="content" #contentEl (scroll)="onContentScroll($event)">
    <router-outlet></router-outlet>
  </div>

  <app-add-stock-modal
    [open]="addStockOpen()"
    (closed)="onAddStockClosed($event)">
  </app-add-stock-modal>
</div>
